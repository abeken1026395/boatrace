<script>
var RAW = __DATA_PLACEHOLDER__;

/* е ҙгҒ®жүҖеңЁж”ҜйғЁпјҲең°е…ғеҲӨе®ҡгғ»еӣәе®ҡжғ…е ұпјү */
var HOME_BRANCH = {"01":"зҫӨйҰ¬","02":"еҹјзҺү","03":"жқұдә¬","04":"жқұдә¬","05":"жқұдә¬","06":"йқҷеІЎ","07":"ж„ӣзҹҘ","08":"ж„ӣзҹҘ","09":"дёүйҮҚ","10":"зҰҸдә•","11":"ж»ӢиіҖ","12":"еӨ§йҳӘ","13":"е…өеә«","14":"еҫіеі¶","15":"йҰҷе·қ","16":"еІЎеұұ","17":"еәғеі¶","18":"еұұеҸЈ","19":"еұұеҸЈ","20":"зҰҸеІЎ","21":"зҰҸеІЎ","22":"зҰҸеІЎ","23":"дҪҗиіҖ","24":"й•·еҙҺ"};
var LANE_COLOR = {1:["#ffffff","#111111"],2:["#15181c","#ffffff"],3:["#e63946","#ffffff"],4:["#1d6fd6","#ffffff"],5:["#f2c94c","#111111"],6:["#27ae60","#ffffff"]};
/* жұәгҒҫгӮҠжүӢгӮ«гғҶгӮҙгғӘиүІпјҲdatavizжӨңиЁјжёҲгҒҝ: CVD О”E 41+пјү */
var KMR_COLS = {"йҖғгҒ’":"#3987e5","е·®гҒ—":"#199e70","гҒҫгҒҸгӮҠ":"#c98500","гҒҫгҒҸгӮҠе·®гҒ—":"#9085e9"};

var col = {}; RAW.columns.forEach(function(c,i){ col[c]=i; });
function g(row,name){ var i=col[name]; return i===undefined ? "" : String(row[i]==null?"":row[i]); }

/* е ҙгҒ”гҒЁгҒ«ж•ҙзҗҶпјҲе ҙгӮігғјгғү+й–ӢеӮ¬ж—ҘгҒ§дёҖж„ҸеҢ–пјү */
var venues = {};
RAW.data.forEach(function(row){
  var jcd=g(row,"е ҙгӮігғјгғү"), name=g(row,"е ҙеҗҚ"), hd=g(row,"й–ӢеӮ¬ж—Ҙ");
  var key=jcd+"_"+hd;
  if(!venues[key]) venues[key]={key:key, jcd:jcd, name:name, setsu:g(row,"зҜҖеҗҚ"), day:g(row,"ж—Ҙзӣ®"), hd:hd, races:{}};
  var rno=parseInt(g(row,"гғ¬гғјгӮ№"));
  if(!venues[key].races[rno]) venues[key].races[rno]={deadline:g(row,"з· еҲҮжҷӮеҲ»"), kikaku:g(row,"дјҒз”»еҗҚ"), boats:[]};
  venues[key].races[rno].boats.push(row);
});
Object.keys(venues).forEach(function(k){
  Object.keys(venues[k].races).forEach(function(r){
    venues[k].races[r].boats.sort(function(a,b){ return parseInt(g(a,"жһ "))-parseInt(g(b,"жһ ")); });
  });
});

/* ===== еӨ–йғЁгғҮгғјгӮҝзөҗеҗҲ ===== */
var arare=null, weather=null, arareHd="";
var KMR={};        /* зҷ»йҢІз•ӘеҸ· -> жұәгҒҫгӮҠжүӢ/иў«гҒ•гӮҢзӯү */
var HL={};         /* е ҙгӮігғјгғү_гғ¬гғјгӮ№ -> гғ¬гғјгӮ№иҰӢгҒ©гҒ“гӮҚпјҲж©ҹеҠӣ/жіўд№ұ/еұ•й–Ӣ зӯүпјү */
var PROF={};       /* зҷ»йҢІз•ӘеҸ· -> гҒӮгҒ еҗҚ/note */
var HL_META={fix:[], hd:""};

function loadJSON(u){ return fetch(u).then(function(r){return r.json();}); }
function loadText(u){ return fetch(u).then(function(r){return r.text();}); }

loadJSON("../data/arare.json").then(function(j){arare=j;arareHd=String(j&&j.generated||"").slice(0,10).replace(/-/g,"");rerender();}).catch(function(){});
loadJSON("../data/weather.json").then(function(j){weather=j;rerender();}).catch(function(){});
loadJSON("../players/profile.json").then(function(j){PROF=j||{};rerender();}).catch(function(){});
loadText("../players/racerKimarite.csv").then(function(t){ parseKimarite(t); rerender(); }).catch(function(){});
loadJSON("../highlights/highlights.json").then(function(j){ parseHL(j); rerender(); }).catch(function(){});

function parseKimarite(txt){
  var lines=txt.replace(/\r/g,"").split("\n").filter(function(l){return l.length;});
  if(!lines.length) return;
  var h=lines[0].split(","), ix={}; h.forEach(function(c,i){ix[c]=i;});
  function num(a,c){ var v=parseFloat(a[ix[c]]); return isNaN(v)?0:v; }
  for(var i=1;i<lines.length;i++){
    var a=lines[i].split(","); if(a.length<h.length) continue;
    var t=a[ix["зҷ»йҢІз•ӘеҸ·"]];
    KMR[t]={
      out:num(a,"еҮәиө°ж•°"), win:num(a,"1зқҖж•°"),
      nige:num(a,"йҖғгҒ’"), sashi:num(a,"е·®гҒ—"), makuri:num(a,"гҒҫгҒҸгӮҠ"), makurizashi:num(a,"гҒҫгҒҸгӮҠе·®гҒ—"),
      maeritu:num(a,"еүҚгҒҘгҒ‘зҺҮ"), sasare:num(a,"гҒ•гҒ•гӮҢзҺҮ"), makurare:num(a,"гҒҫгҒҸгӮүгӮҢзҺҮ")
    };
  }
}
function parseHL(j){
  if(!j) return;
  HL_META.fix = j["зўәе®ҡгӮӨгғізҺҮе ҙ"]||[];
  HL_META.hd = j["й–ӢеӮ¬ж—Ҙ"]||"";
  (j["гғ¬гғјгӮ№"]||[]).forEach(function(r){
    var key=r["е ҙгӮігғјгғү"]+"_"+r["гғ¬гғјгӮ№"];
    var boats={};
    (r["иүҮ"]||[]).forEach(function(b){ boats[b["жһ "]]=b; });
    HL[key]={ haran:r["жіўд№ұ"], inkata:r["гӮӨгғіе …"], in1:r["гӮӨгғі1зқҖзҺҮ"], motor:r["гғўгғјгӮҝгғјдҪҝз”Ё"],
              tenkai:r["еұ•й–Ӣ"]||[], boats:boats };
  });
}

var view={page:"venues", key:null, rno:null, sort:"жһ "};
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function nowJST(){ return new Date(Date.now()+9*3600*1000); }
function fmtNum(s){ var f=parseFloat(s); return isNaN(f)?"-":f.toFixed(2); }
function fmtPct(s){ var f=parseFloat(s); return isNaN(f)?"-":f.toFixed(1)+"%"; }
function toMin(dl){ var m=/^(\d{1,2}):(\d{2})$/.exec(dl); return m?parseInt(m[1])*60+parseInt(m[2]):null; }
function curMin(){ var n=nowJST(); return n.getUTCHours()*60+n.getUTCMinutes(); }
function curYmd(){ var n=nowJST(); return n.getUTCFullYear()*1e4+(n.getUTCMonth()+1)*100+n.getUTCDate(); }

/* ===== иЁҳжҶ¶гҒЁеӣһеҸҺгғ«гғјгғ—пјҲlocalStorageгғ»иіӯгҒ‘иҰҒзҙ гҒӘгҒ—гҖӮиӘӯгӮҖдҪ“йЁ“гҒ®вҖңй–ӢгҒ„гҒҹгғ«гғјгғ—вҖқгӮ’й–үгҒҳгҒ•гҒӣгӮӢпјү ===== */
function lsGet(k,d){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
function lsSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
var WATCH=lsGet("br_watch",[]);       /* ж°—гҒ«гҒӘгӮӢпјҲжҳҺзӨәгӮ№гӮҝгғјпјү */
var VIEWED=lsGet("br_viewed",[]);     /* жңҖиҝ‘иҰӢгҒҹпјҲиҮӘеӢ•пјү */
var COLLECTED=lsGet("br_collected",[]); /* зөҗжһңгӮ’еӣһеҸҺжёҲгҒҝгҒ®гӮӯгғј */
function rkey(jcd,hd,rno){ return jcd+"_"+hd+"_"+rno; }
/* гғ¬гғјгӮ№зҠ¶ж…Ӣ: 'pre'(з· еҲҮеүҚ) / 'wait'(зөҗжһңеҫ…гҒЎгҖңз· еҲҮ+12еҲҶ) / 'done'(зөҗжһңзўәе®ҡ) */
function raceStatus(hd,dl){
  var dm=toMin(dl); if(dm===null||!/^\d{8}$/.test(hd)) return 'pre';
  var cur=curYmd(), h=parseInt(hd);
  if(cur>h) return 'done';
  if(cur<h) return 'pre';
  var diff=curMin()-dm;
  if(diff<0) return 'pre';
  return diff<12?'wait':'done';
}
function pruneOld(){
  /* 3ж—Ҙд»ҘдёҠеүҚгҒ®гғ¬гғјгӮ№гҒҜй–“еј•гҒҸпјҲз„ЎйҷҗиӮҘеӨ§йҳІжӯўпјү */
  var cut=curYmd()-3;
  function keep(x){ return parseInt(x.hd||"0")>=cut; }
  WATCH=WATCH.filter(keep); VIEWED=VIEWED.filter(keep);
  COLLECTED=COLLECTED.filter(function(k){ return parseInt((k.split("_")[1]||"0"))>=cut; });
}
function isWatched(jcd,hd,rno){ var k=rkey(jcd,hd,rno); return WATCH.some(function(x){return rkey(x.jcd,x.hd,x.rno)===k;}); }
function toggleWatch(v,rno){
  var rc=v.races[rno], k=rkey(v.jcd,v.hd,rno);
  if(isWatched(v.jcd,v.hd,rno)){ WATCH=WATCH.filter(function(x){return rkey(x.jcd,x.hd,x.rno)!==k;}); }
  else { WATCH.unshift({jcd:v.jcd,hd:v.hd,rno:rno,venue:v.name,deadline:rc.deadline,kikaku:rc.kikaku,ts:Date.now()}); }
  lsSet("br_watch",WATCH);
}
function recordViewed(v,rno){
  var rc=v.races[rno], k=rkey(v.jcd,v.hd,rno);
  VIEWED=VIEWED.filter(function(x){return rkey(x.jcd,x.hd,x.rno)!==k;});
  VIEWED.unshift({jcd:v.jcd,hd:v.hd,rno:rno,venue:v.name,deadline:rc.deadline,ts:Date.now()});
  if(VIEWED.length>40) VIEWED=VIEWED.slice(0,40);
  lsSet("br_viewed",VIEWED);
}
function isCollected(jcd,hd,rno){ return COLLECTED.indexOf(rkey(jcd,hd,rno))>=0; }
function markCollected(jcd,hd,rno){ var k=rkey(jcd,hd,rno); if(COLLECTED.indexOf(k)<0){ COLLECTED.push(k); lsSet("br_collected",COLLECTED); } }
function resultUrl(jcd,hd,rno){ return "https://www.boatrace.jp/owpc/pc/race/raceresult?rno="+rno+"&jcd="+jcd+"&hd="+hd; }
/* гҖҢж°—гҒ«гҒӘгӮӢ/иҰӢгҒҹгҖҚгғ¬гғјгӮ№гҒ®гҒҶгҒЎзөҗжһңзўәе®ҡгғ»жңӘеӣһеҸҺгҒ®дёҖиҰ§пјҲеӣһеҸҺеҜҫиұЎпјү */
function harvestList(){
  var seen={}, out=[];
  WATCH.concat(VIEWED).forEach(function(x){
    var k=rkey(x.jcd,x.hd,x.rno);
    if(seen[k]) return; seen[k]=1;
    if(raceStatus(x.hd,x.deadline)==='done' && !isCollected(x.jcd,x.hd,x.rno))
      out.push(x);
  });
  return out;
}

function isClosed(hd,dl){
  var dm=toMin(dl); if(dm===null||!/^\d{8}$/.test(hd)) return false;
  var cur=curYmd();
  if(cur>parseInt(hd)) return true;
  if(cur<parseInt(hd)) return false;
  return curMin()>dm;
}
/* з· еҲҮгҒҫгҒ§гҒ®ж®ӢгӮҠпјҲеҲҶпјүгҖӮйҒҺеҺ»ж—Ҙ=з· еҲҮгҖҒжңӘжқҘж—Ҙ=nullпјҲеӨ§гҒҚгҒҸе…Ҳпјү */
function minsToClose(hd,dl){
  var dm=toMin(dl); if(dm===null||!/^\d{8}$/.test(hd)) return null;
  var cur=curYmd();
  if(cur>parseInt(hd)) return -1;
  if(cur<parseInt(hd)) return 9999;
  return dm-curMin();
}

function findArare(jcd,rno,hd){
  if(!arare||!arare.races) return null;
  var hit=null, hasHd=false;
  Object.keys(arare.races).forEach(function(k){
    var r=arare.races[k];
    if(String(r.jcd)!==String(jcd)||parseInt(r.rno)!==parseInt(rno)) return;
    if(r.hd){ hasHd=true; if(String(r.hd)===String(hd)) hit=r; }
    else if(!hit){ hit=r; }   /* й–ӢеӮ¬ж—Ҙгғ•гӮЈгғјгғ«гғүгҒҢз„ЎгҒ„ж—§гғҮгғјгӮҝ */
  });
  /* ж—§гғҮгғјгӮҝ(hdз„ЎгҒ—)гҒҜз”ҹжҲҗж—ҘгӮ¬гғјгғүгҒ§еҲҘж—ҘгӮ’жҺ’йҷӨгҖӮж–°гғҮгғјгӮҝгҒҜhdеҺіеҜҶдёҖиҮҙжёҲгҒҝ */
  if(!hasHd && hd && arareHd && arareHd!==hd) return null;
  return hit;
}
function findWind(jcd,hd,dl){
  if(!weather||!weather.stadiums||!weather.stadiums[jcd]) return null;
  if(!/^\d{8}$/.test(hd)||!/^\d{1,2}:\d{2}$/.test(dl)) return null;
  var target=hd.slice(0,4)+"-"+hd.slice(4,6)+"-"+hd.slice(6,8)+"T"+("0"+dl).slice(-5);
  var tms=Date.parse(target+"+09:00"), best=null, bd=1e15;
  (weather.stadiums[jcd].hourly||[]).forEach(function(h){
    var d=Math.abs(Date.parse(h.time+"+09:00")-tms);
    if(d<bd){bd=d;best=h;}
  });
  return best;
}
var WIND_ARROW={"еҢ—":"вҶ“","еҢ—жқұ":"вҶҷ","жқұ":"вҶҗ","еҚ—жқұ":"вҶ–","еҚ—":"вҶ‘","еҚ—иҘҝ":"вҶ—","иҘҝ":"вҶ’","еҢ—иҘҝ":"вҶҳ"};
function windArrow(dir){ if(!dir) return ""; for(var k in WIND_ARROW){ if(dir.indexOf(k)>=0) return WIND_ARROW[k]; } return ""; }

/* ===== жҸҸз”» ===== */
function render(){
  var app=document.getElementById("app"), crumb=document.getElementById("crumb");
  document.getElementById("updated").textContent="жӣҙж–°: "+(RAW.updated||"-")+"пҪңеҮәе…ё: BOATRACEе…¬ејҸеҮәиө°иЎЁ гҒ»гҒӢ";
  var keys=Object.keys(venues);
  if(keys.length===0){ app.innerHTML='<div class="empty">жң¬ж—ҘгҒ®еҮәиө°иЎЁгғҮгғјгӮҝгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“</div>'; crumb.innerHTML=""; return; }

  if(view.page==="venues"){ renderVenues(app,crumb,keys); return; }
  var v=venues[view.key];
  if(!v){ view={page:"venues",sort:view.sort}; render(); return; }
  if(view.page==="races"){ renderRaces(app,crumb,v); return; }
  renderRace(app,crumb,v);
}

function renderVenues(app,crumb,keys){
  crumb.innerHTML="е ҙгӮ’йҒёжҠһ";
  var byDate={};
  keys.forEach(function(k){ var v=venues[k]; (byDate[v.hd]=byDate[v.hd]||[]).push(v); });
  var dates=Object.keys(byDate).sort();
  var todayJST=(function(){ var n=nowJST(); return n.getUTCFullYear()+("0"+(n.getUTCMonth()+1)).slice(-2)+("0"+n.getUTCDate()).slice(-2); })();
  var html=buildMyPanel();
  dates.forEach(function(hd){
    var list=byDate[hd].sort(function(a,b){return a.jcd<b.jcd?-1:1;});
    var mm=hd.slice(4,6),dd=hd.slice(6,8);
    var dow=["ж—Ҙ","жңҲ","зҒ«","ж°ҙ","жңЁ","йҮ‘","еңҹ"][new Date(parseInt(hd.slice(0,4)),parseInt(mm)-1,parseInt(dd)).getDay()];
    html+='<div class="date-head">'+esc((hd===todayJST?"жң¬ж—Ҙ":"зҝҢж—Ҙ")+" "+mm+"/"+dd+"("+dow+")")+'</div>';
    html+=list.map(function(v){
      var rs=Object.keys(v.races).map(Number).sort(function(a,b){return a-b;});
      var first=v.races[rs[0]],last=v.races[rs[rs.length-1]];
      var fix=HL_META.fix.indexOf(v.name)>=0?'<span class="chip chip-fix" style="margin-left:6px">йҖІе…Ҙеӣәе®ҡ</span>':'';
      return '<div class="venue-card" data-k="'+esc(v.key)+'">'
        +'<div class="venue-name">'+esc(v.name)+'</div>'
        +'<div class="venue-meta">'+esc(v.setsu)+fix+'<br>'+rs.length+'RпҪң'+esc(first.deadline)+'гҖң'+esc(last.deadline)+'</div>'
        +'<div class="venue-day">'+esc(v.day)+'</div></div>';
    }).join("");
  });
  app.innerHTML=html;
  Array.prototype.forEach.call(app.querySelectorAll(".venue-card"),function(el){
    el.onclick=function(){ view={page:"races",key:el.getAttribute("data-k"),rno:null,sort:view.sort}; render(); window.scrollTo(0,0); };
  });
  wireMyPanel(app);
}

/* гҖҢж°—гҒ«гҒӘгӮӢ/жңҖиҝ‘иҰӢгҒҹ/еӣһеҸҺгҖҚгғ‘гғҚгғ«гҒ®HTML */
function buildMyPanel(){
  pruneOld();
  var harvest=harvestList();
  var waiting=WATCH.filter(function(x){ var s=raceStatus(x.hd,x.deadline); return s==='pre'||s==='wait'; });
  var hset={}; harvest.forEach(function(x){ hset[rkey(x.jcd,x.hd,x.rno)]=1; });
  var recent=VIEWED.filter(function(x){ return !hset[rkey(x.jcd,x.hd,x.rno)]; }).slice(0,8);
  if(!harvest.length && !waiting.length && !recent.length) return "";
  var h='<div class="my">';
  if(harvest.length){
    h+='<div class="my-sec harvest"><div class="my-h">рҹҺЈ зөҗжһңгҒҢеҮәгҒҹ<span class="cnt">'+harvest.length+'</span></div>';
    h+=harvest.map(function(x){
      var k=rkey(x.jcd,x.hd,x.rno);
      return '<div class="my-row">'
        +'<div class="my-rl" data-open="'+esc(k)+'"><div class="my-rt">'+esc(x.venue)+' '+x.rno+'R</div><div class="my-rs">'+esc(x.kikaku||"")+(x.kikaku?'пҪң':'')+'з· еҲҮ '+esc(x.deadline||"")+'</div></div>'
        +'<a class="harvest-link" data-collect="'+esc(k)+'" href="'+resultUrl(x.jcd,x.hd,x.rno)+'" target="_blank" rel="noopener">зөҗжһң вҶ’</a>'
        +'<button class="harvest-x" data-collect="'+esc(k)+'" title="еӣһеҸҺжёҲгҒҝгҒ«гҒҷгӮӢ">вң“</button>'
        +'</div>';
    }).join("")+'</div>';
  }
  if(waiting.length){
    h+='<div class="my-sec watch"><div class="my-h">рҹ”– ж°—гҒ«гҒӘгӮӢ</div>';
    h+=waiting.map(function(x){
      var s=raceStatus(x.hd,x.deadline), k=rkey(x.jcd,x.hd,x.rno);
      var pill=s==='wait'?'<span class="pill pill-wait">зөҗжһңеҫ…гҒЎ</span>':'<span class="pill pill-pre">з· еҲҮеүҚ</span>';
      return '<div class="my-row"><div class="my-rl" data-open="'+esc(k)+'"><div class="my-rt">'+esc(x.venue)+' '+x.rno+'R</div><div class="my-rs">з· еҲҮ '+esc(x.deadline||"")+'</div></div>'+pill+'</div>';
    }).join("")+'</div>';
  }
  if(recent.length){
    h+='<div class="my-sec recent"><div class="my-h">жңҖиҝ‘иҰӢгҒҹ</div><div class="recent-chips">'
      +recent.map(function(x){ return '<span class="rchip" data-open="'+esc(rkey(x.jcd,x.hd,x.rno))+'">'+esc(x.venue)+' '+x.rno+'R</span>'; }).join("")
      +'</div></div>';
  }
  return h+'</div>';
}
function myOpen(k){
  var p=String(k).split("_"); if(p.length<3) return;
  var vkey=p[0]+"_"+p[1];
  if(venues[vkey]){ view={page:"race",key:vkey,rno:parseInt(p[2]),sort:view.sort}; render(); window.scrollTo(0,0); }
}
function wireMyPanel(app){
  Array.prototype.forEach.call(app.querySelectorAll("[data-open]"),function(el){
    el.onclick=function(){ myOpen(el.getAttribute("data-open")); };
  });
  Array.prototype.forEach.call(app.querySelectorAll(".harvest-x"),function(el){
    el.onclick=function(e){ e.stopPropagation(); var p=el.getAttribute("data-collect").split("_"); markCollected(p[0],p[1],p[2]); render(); };
  });
  Array.prototype.forEach.call(app.querySelectorAll(".harvest-link"),function(el){
    el.onclick=function(){ var p=el.getAttribute("data-collect").split("_"); markCollected(p[0],p[1],p[2]); setTimeout(render,400); };
  });
}

function renderRaces(app,crumb,v){
  crumb.innerHTML='<a href="#" id="back">е ҙдёҖиҰ§</a> пјһ '+esc(v.name);
  var rs=Object.keys(v.races).map(Number).sort(function(a,b){return a-b;});
  var anyDot=false;
  var grid=rs.map(function(r){
    var rc=v.races[r], cl=isClosed(v.hd,rc.deadline)?" closed":"";
    var ar=findArare(v.jcd,r,v.hd);
    var dot=ar?'<span class="dot dot-'+esc(ar.level)+'"></span>':'';
    if(ar) anyDot=true;
    return '<div class="rbtn'+cl+'" data-r="'+r+'">'+dot+'<div class="rno">'+r+'R</div><div class="dl">'+esc(rc.deadline||"")+'</div></div>';
  }).join("");
  var legend=anyDot
    ?'<div class="legend-note">еҸідёҠгҒ®гғүгғғгғҲпјқиҚ’гӮҢжҢҮж•°пјҲ<span class="lv-й«ҳ">й«ҳ</span>/<span class="lv-дёӯ">дёӯ</span>/<span class="lv-дҪҺ">дҪҺ</span>пјү</div>'
    :'<div class="legend-note">иҚ’гӮҢжҢҮж•°гҒҜеҪ“ж—ҘеҲҶгҒ®з”ҹжҲҗеҫҢпјҲжҜҺжңқпјүгҒ«еҗ„RгҒёиЎЁзӨәгҒ•гӮҢгҒҫгҒҷгҖӮ</div>';
  app.innerHTML='<div class="rgrid">'+grid+'</div>'+legend;
  document.getElementById("back").onclick=function(e){e.preventDefault();view={page:"venues",sort:view.sort};render();};
  Array.prototype.forEach.call(app.querySelectorAll(".rbtn"),function(el){
    el.onclick=function(){ view={page:"race",key:view.key,rno:parseInt(el.getAttribute("data-r")),sort:view.sort}; render(); window.scrollTo(0,0); };
  });
}

/* жұәгҒҫгӮҠжүӢж§ӢжҲҗгғҗгғј */
function kimariteBar(km){
  if(!km) return "";
  var cats=[["йҖғгҒ’",km.nige],["е·®гҒ—",km.sashi],["гҒҫгҒҸгӮҠ",km.makuri],["гҒҫгҒҸгӮҠе·®гҒ—",km.makurizashi]];
  var sum=cats.reduce(function(s,c){return s+c[1];},0);
  if(sum<=0) return '<div class="kmr"><div class="kmr-ttl"><span>жұәгҒҫгӮҠжүӢж§ӢжҲҗ</span><span>гғҮгғјгӮҝеғ…е°‘</span></div></div>';
  var segs=cats.filter(function(c){return c[1]>0;}).map(function(c){
    var pc=Math.round(c[1]/sum*100);
    return '<div class="kmr-seg" style="width:'+(c[1]/sum*100)+'%;background:'+KMR_COLS[c[0]]+'" title="'+c[0]+' '+pc+'%"></div>';
  }).join("");
  var legend=cats.map(function(c){
    var pc=sum?Math.round(c[1]/sum*100):0;
    return '<span><span class="kmr-dot" style="background:'+KMR_COLS[c[0]]+'"></span>'+c[0]+' '+pc+'%</span>';
  }).join("");
  return '<div class="kmr"><div class="kmr-ttl"><span>жұәгҒҫгӮҠжүӢж§ӢжҲҗпјҲ1зқҖ'+km.win+'/'+km.out+'иө°пјү</span></div>'
    +'<div class="kmr-bar">'+segs+'</div><div class="kmr-legend">'+legend+'</div></div>';
}

/* д»ҠзҜҖжҲҗзёҫгғҹгғӢгғҶгғјгғ–гғ«пјҲйҖІе…Ҙ/зқҖгҖҒзқҖиүІпјү */
var SHU_COLS=["1ж—Ҙзӣ®жҲҗзёҫ","2ж—Ҙзӣ®жҲҗзёҫ","3ж—Ҙзӣ®жҲҗзёҫ","4ж—Ҙзӣ®жҲҗзёҫ","5ж—Ҙзӣ®жҲҗзёҫ","6ж—Ҙзӣ®жҲҗзёҫ"];
var SHU_LABELS=["еҲқж—Ҙ","2ж—Ҙ","3ж—Ҙ","4ж—Ҙ","5ж—Ҙ","жңҖзөӮ"];
function shuTable(row){
  var has=false;
  var cells=SHU_COLS.map(function(c){
    var vv=g(row,c).trim();
    if(!vv) return '<td class="shu-empty">гғ»</td>';
    has=true;
    var disp=vv.split(" ").map(function(rr){
      var p=rr.split("/"); if(p.length<4) return esc(rr);
      var ch=parseInt(p[3]), cls=ch===1?"r1":ch===2?"r2":ch===3?"r3":"rx";
      return '<span class="'+cls+'">'+esc(p[1]+"/"+p[3])+'</span>';
    }).join("<br>");
    return '<td>'+disp+'</td>';
  });
  if(!has) return "";
  var head=SHU_LABELS.map(function(l){return '<th>'+l+'</th>';}).join("");
  return '<div class="shu-wrap"><div class="shu-cap">д»ҠзҜҖжҲҗзёҫпјҲйҖІе…ҘгӮігғјгӮ№/зқҖй Ҷгғ»<span class="r1">1зқҖ</span>йҮ‘пјү</div>'
    +'<table class="shu"><tr>'+head+'</tr><tr>'+cells.join("")+'</tr></table></div>';
}

function renderRace(app,crumb,v){
  var rc=v.races[view.rno];
  if(!rc){ view={page:"races",key:view.key,sort:view.sort}; render(); return; }
  recordViewed(v,view.rno);   /* иҰӢгҒҹгғ¬гғјгӮ№гӮ’иЁҳжҶ¶пјҲеӣһеҸҺгғ«гғјгғ—гҒ®иө·зӮ№пјү */
  crumb.innerHTML='<a href="#" id="back0">е ҙдёҖиҰ§</a> пјһ <a href="#" id="back1">'+esc(v.name)+'</a> пјһ '+view.rno+'R';
  /* иҰӢгҒ©гҒ“гӮҚзөҗеҗҲгҒҜй–ӢеӮ¬ж—ҘдёҖиҮҙжҷӮгҒ®гҒҝпјҲstale/зҝҢж—ҘгғҮгғјгӮҝгҒ®иӘӨзөҗеҗҲгӮ’йҳІжӯўпјү */
  var hlKey=v.jcd+"_"+view.rno+"R";
  var hl=(HL[hlKey]&&HL_META.hd===v.hd)?HL[hlKey]:null;

  /* гғҳгғғгғҖпјӢз· еҲҮгӮ«гӮҰгғігғҲгғҖгӮҰгғі */
  function fmtMins(m){ if(m<60) return m+"еҲҶ"; return Math.floor(m/60)+"жҷӮй–“"+(m%60)+"еҲҶ"; }
  var mins=minsToClose(v.hd,rc.deadline), cdCls="cd-open", cdTxt="";
  if(mins===null){ cdTxt=""; }
  else if(mins<0){ cdCls="cd-closed"; cdTxt="з· еҲҮжёҲгҒҝ"; }
  else if(mins>=9999){ cdCls="cd-open"; cdTxt="зҝҢж—Ҙй–ӢеӮ¬"; }
  else if(mins<=15){ cdCls="cd-soon"; cdTxt="з· еҲҮгҒҫгҒ§"+fmtMins(mins); }
  else { cdCls="cd-open"; cdTxt="з· еҲҮгҒҫгҒ§"+fmtMins(mins); }
  var cdHtml=cdTxt?'<span class="cd '+cdCls+'">'+esc(cdTxt)+'</span>':'';

  /* ж°—гҒ«гҒӘгӮӢпјҲиЁҳжҶ¶пјүпјӢе…¬ејҸгғӘгғігӮҜпјҲеҮәиө°иЎЁгғ»зөҗжһңпјү */
  var wOn=isWatched(v.jcd,v.hd,view.rno);
  var wbtn='<span class="watchbtn'+(wOn?' on':'')+'" id="watchbtn">'+(wOn?'вң… иҝҪеҠ жёҲгҒҝ':'рҹ”– ж°—гҒ«гҒӘгӮӢ')+'</span>';
  var off="";
  if(/^\d{8}$/.test(v.hd)){
    var base="https://www.boatrace.jp/owpc/pc/race/", q="?rno="+view.rno+"&jcd="+v.jcd+"&hd="+v.hd;
    var closed=isClosed(v.hd,rc.deadline);
    off='<a class="offlink '+(closed?"offlink-result":"offlink-pend")+'" href="'+base+'raceresult'+q+'" target="_blank" rel="noopener">рҹҸҒ '+(closed?"гғ¬гғјгӮ№зөҗжһңпјҲе…¬ејҸпјү":"зөҗжһңпјҲз· еҲҮеҫҢгҒ«зўәе®ҡпјү")+' вҶ—</a>'
      +'<a class="offlink offlink-card" href="'+base+'racelist'+q+'" target="_blank" rel="noopener">е…¬ејҸеҮәиө°иЎЁ вҶ—</a>';
  }
  var links='<div class="race-links">'+wbtn+off+'</div>';
  var html='<div class="race-head"><div class="line1"><span class="rt">'+esc(v.name)+' '+view.rno+'R</span><span class="kikaku">'+esc(rc.kikaku)+'</span></div>'
    +'<div class="dl">'+cdHtml+'<span>з· еҲҮ '+esc(rc.deadline||"-")+'</span><span>'+esc(v.setsu)+' '+esc(v.day)+'</span></div>'
    +links+'</div>';

  /* гӮөгғһгғӘгғјгғҒгғғгғ— */
  var ar=findArare(v.jcd,view.rno,v.hd), wd=findWind(v.jcd,v.hd,rc.deadline);
  var chips=[];
  if(ar) chips.push('<span class="chip chip-arare-'+esc(ar.level)+'">иҚ’гӮҢ <b>'+esc(ar.level)+'</b> '+esc(ar.score)+'/'+esc((arare&&arare.max_score)||"-")+'</span>');
  if(hl&&hl.in1!=null) chips.push('<span class="chip">гӮӨгғі1зқҖзҺҮ <b>'+esc(hl.in1)+'%</b></span>');
  if(hl&&hl.haran!=null) chips.push('<span class="chip">жіўд№ұеәҰ <b>'+esc(hl.haran)+'</b></span>');
  if(HL_META.fix.indexOf(v.name)>=0) chips.push('<span class="chip chip-fix">йҖІе…Ҙеӣәе®ҡ</span>');
  if(wd) chips.push('<span class="chip">йўЁ <b>'+esc(windArrow(wd.dir)+" "+wd.dir)+'</b> '+esc(wd.wind)+'m</span>');
  if(chips.length) html+='<div class="chips">'+chips.join("")+'</div>';

  /* иҚ’гӮҢиҰҒеӣ  */
  if(ar&&ar.factors&&ar.factors.length){
    html+='<div class="panel panel-arare"><div class="ttl">иҚ’гӮҢгӮөгӮӨгғі</div><ul>'+ar.factors.map(function(f){return '<li>'+esc(f)+'</li>';}).join("")+'</ul></div>';
  }
  /* еұ•й–ӢпјҲиӨҮж•°гӮ·гғҠгғӘгӮӘгғ»ж–ӯе®ҡгҒӘгҒ—гҖӮиҰӢз«ӢгҒҰ/жіўеҸҠгҒҜйқһиЎЁзӨәпјү */
  if(hl&&hl.tenkai&&hl.tenkai.length){
    html+='<div class="panel panel-tenkai"><div class="ttl">еұ•й–ӢгҒ®иҰӢгҒ©гҒ“гӮҚ</div><ul>'
      +hl.tenkai.map(function(t){return '<li>'+esc(t)+'</li>';}).join("")
      +'</ul><div class="note">вҖ»гғҮгғјгӮҝгҒ«еҹәгҒҘгҒҸиӨҮж•°гӮ·гғҠгғӘгӮӘгҒ®дҪөзҪ®гҖӮеӢқж•—гҒ®ж–ӯе®ҡгғ»иІ·гҒ„зӣ®гҒ§гҒҜгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮ</div></div>';
  }
  /* йўЁи©ізҙ° */
  if(wd){
    html+='<div class="panel panel-wind"><div class="ttl">з· еҲҮжҷӮеҲ»гҒ®йўЁдәҲе ұ</div>'
      +esc((windArrow(wd.dir)+" ")+wd.dir)+' '+esc(wd.wind)+'mпҪң'+esc(wd.wx)+'пјҲ'+esc(String(wd.time).replace("T"," ").slice(5))+' жҷӮзӮ№пјү</div>';
  }

  /* дёҰгҒіжӣҝгҒҲ */
  var sorts=[["жһ ","жһ й Ҷ"],["ST","е№іеқҮST"],["ж©ҹеҠӣ","ж©ҹеҠӣ"],["еҪ“ең°","еҪ“ең°еӢқзҺҮ"]];
  html+='<div class="sortbar">'+sorts.map(function(s){
    return '<span class="sortbtn'+(view.sort===s[0]?" on":"")+'" data-s="'+s[0]+'">'+esc(s[1])+'й Ҷ</span>';
  }).join("")+'</div>';

  /* зӣёеҜҫжҜ”ијғз”ЁгҒ®еҹәжә–еҖӨ */
  var boats=rc.boats.slice();
  var sts=boats.map(function(r){return parseFloat(g(r,"е№іеқҮST"));}).filter(function(x){return !isNaN(x);});
  var minST=Math.min.apply(null,sts), maxST=Math.max.apply(null,sts);
  var motors=boats.map(function(r){return parseFloat(g(r,"гғўгғјгӮҝгғј2йҖЈзҺҮ"));}).filter(function(x){return !isNaN(x);});
  var maxMotor=Math.max.apply(null,motors);

  /* дёҰгҒіжӣҝгҒҲйҒ©з”Ё */
  function sortKey(r){
    if(view.sort==="ST"){ var s=parseFloat(g(r,"е№іеқҮST")); return isNaN(s)?99:s; }
    if(view.sort==="ж©ҹеҠӣ"){ var m=parseFloat(g(r,"гғўгғјгӮҝгғј2йҖЈзҺҮ")); return isNaN(m)?-1:-m; }
    if(view.sort==="еҪ“ең°"){ var t=parseFloat(g(r,"еҪ“ең°еӢқзҺҮ")); return isNaN(t)?-1:-t; }
    return parseInt(g(r,"жһ "));
  }
  boats.sort(function(a,b){ return sortKey(a)-sortKey(b); });

  html+=boats.map(function(row){ return boatCard(row,v,hl,minST,maxST,maxMotor); }).join("");

  html+='<div class="legend-note">еҮәе…ё: BOATRACEе…¬ејҸеҮәиө°иЎЁпјҲеӢқзҺҮгғ»гғўгғјгӮҝгғјгғ»д»ҠзҜҖжҲҗзёҫпјүпҪңжұәгҒҫгӮҠжүӢгғ»иў«гҒ•гӮҢзҺҮгҒҜзӣҙиҝ‘183ж—ҘйӣҶиЁҲпҪңж©ҹеҠӣи©•дҫЎгғ»еұ•й–Ӣгғ»иҚ’гӮҢжҢҮж•°гҒҜеҪ“гғқгғјгӮҝгғ«з”ҹжҲҗпҪңйўЁгҒҜOpen-MeteoгҖӮ<br>жң¬гғҡгғјгӮёгҒҜж°ҙйқўеӮҫеҗ‘гғ»еұ•й–ӢгҒ®еҸҜиҰ–еҢ–гҒ«з•ҷгӮҒгҖҒеӢқж•—гҒ®ж–ӯе®ҡгғ»иІ·гҒ„зӣ®гғ»зўәзҺҮгҒҜжҸҗзӨәгҒ—гҒҫгҒӣгӮ“гҖӮ</div>';

  app.innerHTML=html;
  document.getElementById("back0").onclick=function(e){e.preventDefault();view={page:"venues",sort:view.sort};render();};
  document.getElementById("back1").onclick=function(e){e.preventDefault();view={page:"races",key:view.key,sort:view.sort};render();};
  Array.prototype.forEach.call(app.querySelectorAll(".sortbtn"),function(el){
    el.onclick=function(){ view.sort=el.getAttribute("data-s"); render(); };
  });
  var wb=document.getElementById("watchbtn");
  if(wb) wb.onclick=function(){ toggleWatch(v,view.rno); render(); };
}

function boatCard(row,v,hl,minST,maxST,maxMotor){
  var lane=parseInt(g(row,"жһ "));
  var lc=LANE_COLOR[lane]||["#333","#fff"];
  var kl=g(row,"зҙҡеҲҘ");
  var zk=parseFloat(g(row,"е…ЁеӣҪеӢқзҺҮ")), tk=parseFloat(g(row,"еҪ“ең°еӢқзҺҮ"));
  var hot=!isNaN(zk)&&!isNaN(tk)&&tk>zk;
  var fn=parseInt(g(row,"Fж•°"))||0;
  var local=g(row,"ж”ҜйғЁ")===HOME_BRANCH[v.jcd];
  var name=g(row,"ж°ҸеҗҚ").replace(/гҖҖ+/g,"гҖҖ");
  var toban=g(row,"зҷ»йҢІз•ӘеҸ·");
  var km=KMR[toban], pf=PROF[toban]||{}, hb=(hl&&hl.boats[lane])||null;

  var st=parseFloat(g(row,"е№іеқҮST"));
  var fastest=!isNaN(st)&&st===minST;
  var motor=parseFloat(g(row,"гғўгғјгӮҝгғј2йҖЈзҺҮ"));
  var bestMotor=!isNaN(motor)&&motor===maxMotor;
  var machEval=hb?hb["ж©ҹеҠӣи©•дҫЎ"]:null, sharpST=hb?hb["йӢӯST"]:false, localAdv=hb?hb["еҪ“ең°е„ӘдҪҚ"]:false;

  var nick=pf.nickname||pf.tagline||"";
  var badges=''
    +(fastest?'<span class="badge-st">жңҖйҖҹST</span>':'')
    +(bestMotor?'<span class="badge-mach">ж©ҹеҠӣдёҠдҪҚ</span>':'')
    +(local?'<span class="badge-local">ең°е…ғ</span>':'')
    +(fn>0?'<span class="badge-f">F'+fn+'</span>':'');

  /* зӣёеҜҫгғҗгғј: STпјҲе°ҸгҒ•гҒ„гҒ»гҒ©иүҜгҒ„вҶ’еҸҚи»ўпјү, гғўгғјгӮҝгғј */
  var stPct=(!isNaN(st)&&maxST>minST)?((maxST-st)/(maxST-minST)*100):(!isNaN(st)?100:0);
  var moPct=(!isNaN(motor)&&maxMotor>0)?(motor/maxMotor*100):0;
  var meter='<div class="meter">'
    +'<div class="meter-row"><span class="meter-lb">ST</span><div class="meter-track"><div class="meter-fill" style="width:'+stPct.toFixed(0)+'%;background:'+(fastest?"#ffd166":"#3987e5")+'"></div></div><span class="meter-val'+(fastest?" meter-best":"")+'">'+(isNaN(st)?"-":st.toFixed(2))+'</span></div>'
    +'<div class="meter-row"><span class="meter-lb">ж©ҹеҠӣ</span><div class="meter-track"><div class="meter-fill" style="width:'+moPct.toFixed(0)+'%;background:'+(bestMotor?"#c98500":"#256abf")+'"></div></div><span class="meter-val'+(bestMotor?" meter-best":"")+'">'+fmtPct(g(row,"гғўгғјгӮҝгғј2йҖЈзҺҮ"))+'</span></div>'
    +'</div>';

  /* гӮҝгӮ° */
  var tags=[];
  if(sharpST) tags.push('<span class="tag" style="border-color:#3a5170;color:#7ec8ff">йӢӯгҒ„ST</span>');
  if(localAdv||hot) tags.push('<span class="tag tag-local">еҪ“ең°еҫ—ж„Ҹ</span>');
  if(machEval==="high") tags.push('<span class="tag tag-mach-high">ж©ҹеҠӣв—Һ</span>');
  else if(machEval==="low") tags.push('<span class="tag tag-mach-low">ж©ҹеҠӣв–і</span>');
  if(km&&km.sasare>=35) tags.push('<span class="tag" style="border-color:#4a2f3a;color:#c98">иў«гҒ•гӮҢ'+Math.round(km.sasare)+'%</span>');
  if(km&&km.makurare>=35) tags.push('<span class="tag" style="border-color:#4a2f3a;color:#c98">иў«гҒҫгҒҸгӮҠ'+Math.round(km.makurare)+'%</span>');
  var tagsHtml=tags.length?'<div class="tags">'+tags.join("")+'</div>':'';

  var nameHtml=toban
    ?'<a class="pname" href="../players/?toban='+esc(toban)+'" style="color:inherit;text-decoration:none;">'+esc(name)+'<span class="badge-detail">и©ізҙ°</span></a>'
    :'<span class="pname">'+esc(name)+'</span>';

  return '<div class="boat"><div class="lane-bar" style="background:'+lc[0]+'"></div><div class="boat-body">'
    +'<div class="boat-top">'
    +'<span class="lane-num" style="background:'+lc[0]+';color:'+lc[1]+';'+((lane===1||lane===2)?'border:1px solid #445;':'')+'">'+lane+'</span>'
    +'<span class="klass k-'+esc(kl)+'">'+esc(kl)+'</span>'+nameHtml+badges
    +'</div>'
    +(nick?'<div class="nick">вҖң'+esc(nick)+'вҖқ</div>':'')
    +'<div class="boat-sub">'+esc(g(row,"ж”ҜйғЁ"))+'пјҸ'+esc(g(row,"еҮәиә«"))+'гғ»'+esc(g(row,"е№ҙйҪў"))+'жӯі</div>'
    +tagsHtml
    +'<div class="stats">'
    +'<div class="stat"><div class="lb">е…ЁеӣҪеӢқзҺҮ</div><div class="v">'+fmtNum(g(row,"е…ЁеӣҪеӢқзҺҮ"))+'</div><div class="v2">2йҖЈ '+fmtPct(g(row,"е…ЁеӣҪ2йҖЈзҺҮ"))+'</div></div>'
    +'<div class="stat'+(hot?' hot':'')+'"><div class="lb">еҪ“ең°еӢқзҺҮ'+(hot?'<span class="up"> вҶ‘</span>':'')+'</div><div class="v">'+fmtNum(g(row,"еҪ“ең°еӢқзҺҮ"))+'</div><div class="v2">2йҖЈ '+fmtPct(g(row,"еҪ“ең°2йҖЈзҺҮ"))+'</div></div>'
    +'<div class="stat mach"><div class="lb">гғўгғјгӮҝгғј'+(g(row,"гғўгғјгӮҝгғјNo")?' No.'+esc(g(row,"гғўгғјгӮҝгғјNo")):'')+'</div><div class="v">'+fmtPct(g(row,"гғўгғјгӮҝгғј2йҖЈзҺҮ"))+'</div><div class="v2">3йҖЈ '+fmtPct(g(row,"гғўгғјгӮҝгғј3йҖЈзҺҮ"))+'</div></div>'
    +'</div>'
    +meter
    +kimariteBar(km)
    +shuTable(row)
    +'</div></div>';
}

function rerender(){ render(); }
render();
/* з· еҲҮгӮ«гӮҰгғігғҲгғҖгӮҰгғігӮ’жҜҺеҲҶжӣҙж–°пјҲraceз”»йқўгҒ®гҒҝеҶҚжҸҸз”»пјү */
setInterval(function(){ if(view.page==="race") render(); }, 30000);
</script>
