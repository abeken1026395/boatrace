name: regen predictions (past month)

on:
  workflow_dispatch:
    inputs:
      start:
        description: "開始日 YYYYMMDD"
        required: true
        default: "20260606"
      end:
        description: "終了日 YYYYMMDD"
        required: true
        default: "20260705"

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: regenerate predictions
        run: python scripts/regenPredictions.py "${{ github.event.inputs.start }}" "${{ github.event.inputs.end }}"

      - name: commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/
          git diff --cached --quiet || git commit -m "regen predictions ${{ github.event.inputs.start }}-${{ github.event.inputs.end }}"
          git pull --rebase origin main || true
          git push
