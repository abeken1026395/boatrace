name: update tokuyama payouts

on:
  schedule:
    - cron: '20 0 * * *'   # JST 9:20頃（前日のレース確定後）
    - cron: '20 1 * * *'   # 予備
  workflow_dispatch:

concurrency:
  group: boatrace-payouts
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: scrape payouts
        run: python scripts/scrapeTokuyamaPayouts.py

      - name: build man rate json
        run: python scripts/buildTokuyamaManRate.py

      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/payouts/
          git diff --staged --quiet || git commit -m "update tokuyama payouts"
          git push
