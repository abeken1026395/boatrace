name: 当日潮汐（事実情報）更新

on:
  schedule:
    - cron: '0 23 * * *'    # JST 08:00
    - cron: '0 0-12 * * *'  # JST 09:00-21:00（毎正時。現在潮位の更新用）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: boatrace-tidetoday
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/fetchTideToday.py   # Marine潮位。満干潮/現在潮位/干満差/潮回り(月齢)
      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/tideToday.json
          git diff --staged --quiet || git commit -m "update tideToday.json"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref_name }}
